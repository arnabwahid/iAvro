name: CI Triage

on:
  workflow_run:
    workflows: ["CI"]
    types: ["completed"]

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  triage:
    if: >-
      ${{ github.event.workflow_run.conclusion != 'success' }}
    runs-on: macos-14
    env:
      RUN_ID: ${{ github.event.workflow_run.id }}
      LOG_DIR: triage_logs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare triage logs directory
        run: |
          rm -rf "$LOG_DIR" && mkdir -p "$LOG_DIR"

      - name: Download CI logs artifact from failed run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Downloading ci-logs artifact from run $RUN_ID ..."
          gh run download "$RUN_ID" --name ci-logs --dir "$LOG_DIR" || echo "No artifact named ci-logs found."
          echo "Downloaded files:"; find "$LOG_DIR" -maxdepth 2 -type f -print || true

      - name: Print summary tail
        run: |
          SUMMARY=$(ls -1 "$LOG_DIR"/**/ci_summary.txt 2>/dev/null | head -n1 || true)
          if [[ -n "$SUMMARY" ]]; then
            echo '```'
            tail -n 200 "$SUMMARY" || true
            echo '```'
          else
            echo "No ci_summary.txt found in artifact."
          fi

      - name: (Scaffold) Call external fixer service
        if: ${{ env.FIXER_ENDPOINT != '' }}
        env:
          FIXER_ENDPOINT: ${{ secrets.FIXER_ENDPOINT }}
          FIXER_TOKEN: ${{ secrets.FIXER_TOKEN }}
        run: |
          echo "Posting logs to fixer service..."
          SUMMARY=$(ls -1 "$LOG_DIR"/**/ci_summary.txt 2>/dev/null | head -n1 || true)
          if [[ -n "$SUMMARY" ]]; then
            curl -sSf -X POST "$FIXER_ENDPOINT" \
              -H "Authorization: Bearer $FIXER_TOKEN" \
              -H 'Content-Type: text/plain' \
              --data-binary @"$SUMMARY" \
              || echo "Fixer service call failed (scaffold)."
          else
            echo "No summary available to send."; exit 0
          fi

